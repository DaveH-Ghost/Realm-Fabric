name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync
        run: uv sync --group dev
      - name: Ruff check
        run: uv run ruff check campaign_rpg_engine tests
      - name: Ruff format
        run: uv run ruff format --check campaign_rpg_engine tests
      - name: Pytest
        run: uv run pytest

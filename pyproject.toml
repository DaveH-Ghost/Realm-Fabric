[project]
name = "realm-fabric"
version = "0.0.1"
description = "Grid-based agent simulation framework for learning reliable structured LLM output (V0)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic",
    "openai",
    "rich",
    "python-dotenv",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

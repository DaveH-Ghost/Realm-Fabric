<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>realm-studio</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>realm-studio</h1>
    <p class="subtitle">V0.3.1b — area grid</p>
    <button type="button" id="refresh">Refresh</button>
    <span id="status" aria-live="polite"></span>
  </header>
  <main class="layout">
    <section class="grid-panel" aria-label="Area grid">
      <div id="grid" class="grid"></div>
    </section>
    <aside class="meta-panel">
      <h2>Session</h2>
      <dl id="session-meta" class="session-meta"></dl>
      <details class="raw-snapshot">
        <summary>Raw snapshot JSON</summary>
        <pre id="snapshot"></pre>
      </details>
    </aside>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>

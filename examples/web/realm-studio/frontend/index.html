<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>realm-studio</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>realm-studio</h1>
    <p class="subtitle">V0.3.1c — right-click to edit</p>
    <label class="active-agent-label">
      Active
      <select id="active-agent-select" aria-label="Active agent"></select>
    </label>
    <button type="button" id="refresh">Refresh</button>
    <span id="status" aria-live="polite"></span>
  </header>
  <main class="layout">
    <section class="grid-panel" aria-label="Area grid">
      <div id="grid" class="grid"></div>
    </section>
    <aside class="meta-panel">
      <h2>Session</h2>
      <dl id="session-meta" class="session-meta"></dl>
      <details class="raw-snapshot">
        <summary>Raw snapshot JSON</summary>
        <pre id="snapshot"></pre>
      </details>
    </aside>
  </main>

  <div id="context-menu" class="context-menu hidden" role="menu"></div>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div class="modal" role="dialog" aria-modal="true">
      <h2 id="modal-title" class="modal-heading"></h2>
      <form id="modal-form"></form>
      <p id="modal-error" class="modal-error" aria-live="polite"></p>
      <button type="button" id="modal-cancel" class="modal-cancel">Cancel</button>
    </div>
  </div>

  <div id="toast" class="toast hidden" role="status"></div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
